# ScribeIntake — local single-instance deployment.
#
#   docker compose up --build        # build the image (bakes the RAG index) and run
#   open http://localhost:8000       # the full UI + API
#
# LLM credentials are read from .env at RUNTIME (env_file below) — never baked into the image.
# Without a key the app still runs: the deterministic safety gate, the UI, and the committed
# Proof artifacts all work key-free; only live intake turns / summaries need the LLM.
services:
  scribeintake:
    build: .
    image: scribeintake:1.0.1
    container_name: scribeintake
    ports:
      # Host port defaults to 8000 (matches the docs); override if it's taken:
      #   SCRIBE_PORT=8200 docker compose up -d
      - "${SCRIBE_PORT:-8000}:8000"
    # LLM credentials (Azure OpenAI GPT-5.5 by default; or ANTHROPIC_API_KEY for the Claude path).
    # Missing .env is tolerated — comment this out to run fully key-free.
    env_file:
      - .env
    environment:
      # Default CORS open for local testing; tighten for any shared deployment.
      - API_CORS_ORIGINS=*
      # Warm the RAG models (torch + the two BGE models) at startup, off the request path, so the
      # first patient turn isn't penalised by the cold load. Set to 0 to revert to lazy first-turn
      # loading (e.g. to minimise idle memory on a rarely-hit instance).
      - WARM_MODELS_ON_STARTUP=1
      # Reasoning effort for routine intake turns (the latency lever — ~3 model calls/turn, effort
      # paid on each). "low" is fast question-asking; bump to medium/high to trade speed for depth.
      # The terminal clinical summary always runs at high regardless of this.
      - INTAKE_EFFORT=low
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
