name: CI

on:
  push:
  pull_request:

jobs:
  deterministic-gate:
    # Per-commit gate: lint + the deterministic test tier. Runs with NO
    # ANTHROPIC_API_KEY — it must be free and never call the Anthropic API.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "./core[dev]"

      - name: Lint
        run: ruff check

      - name: Deterministic test tier (no API key)
        run: python -m pytest -m "not live"

  # nightly-full-eval (added in Split 07):
  #   Runs the distributional / LLM-judge tier on a schedule with the
  #   ANTHROPIC_API_KEY secret. Never gates a commit. Placeholder until then.
