name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly — drives the eval-full job only

jobs:
  deterministic-gate:
    # Per-commit gate: lint + the deterministic test tier. Runs with NO
    # ANTHROPIC_API_KEY — it must be free and never call the Anthropic API.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core (with dev extras) + API web deps
        # The repo-wide pytest run below also discovers api/tests (Split 10). Those import FastAPI
        # + Starlette's TestClient (httpx), which core[dev] does not provide, so install the API
        # web deps here. api/ itself is import-only (resolved via the repo-root pythonpath).
        run: |
          python -m pip install --upgrade pip
          pip install -e "./core[dev]"
          pip install "fastapi>=0.110,<1" "uvicorn>=0.27,<1" "httpx>=0.27,<1"

      - name: Lint
        run: ruff check

      - name: Deterministic test tier (no API key)
        # Repo-wide (root testpaths): core/tests + api/tests + eval/tests + observability/tests.
        run: python -m pytest -m "not live"

      - name: Deterministic eval gate (no API key)
        # The four byte-reproducible eval metrics (rule correctness, frozen must-escalate,
        # triage floor never violated, schema validity). Exits non-zero on ANY regression,
        # failing the build. Runs no models — free and key-free.
        run: python -m eval.run --deterministic-only

  eval-full:
    # Nightly distributional / LLM-dependent tier. Runs the full ×N eval against the live
    # model with credentials, uploads the leaderboard + raw runs as artifacts, and surfaces
    # drops — but NEVER hard-fails on sampling/judge wobble (only deterministic regressions,
    # which the per-commit gate already catches, are build-breaking). This never gates a commit.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      # Provider reality (PROGRESS Split 03): the wired model is Azure OpenAI GPT-5.5, so the
      # live run reads the Azure secrets. ANTHROPIC_API_KEY is mapped too for forward-compat
      # with the spec's Claude pin — whichever is present is used by the client seam.
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      CHAT_LLM_MODEL: ${{ secrets.CHAT_LLM_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "./core[dev]"
      - name: Full distributional eval (×3)
        # Hard-fails ONLY on a deterministic regression (those stay gated). Distributional
        # numbers are reported, never asserted — a 1-point wobble must not break the build.
        run: python -m eval.run --n 3
      - name: Cost & observability report (Split 09)
        # Regenerate the cost/observability report + dashboard over the eval runs/ fleet (falls
        # back to the synthetic-demo trace if no live DB). Informational; never gates the build.
        if: always()
        run: python -m observability
      - name: Upload leaderboard + runs + cost report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-leaderboard
          path: |
            eval/leaderboard.json
            eval/leaderboard.md
            eval/runs/
            observability/cost_report.json
            observability/cost_report.md
            observability/dashboard.html
