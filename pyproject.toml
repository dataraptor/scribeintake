# Repo-root tooling config (not a package — `core/` is the installable package).
# This is the rootdir pytest discovers when run from the repo root, and the single
# source of ruff config for the whole repo.

[tool.pytest.ini_options]
# Repo-wide from the start (Split 01 note): only core/tests exists today, but
# api/tests (Split 10) and eval/tests (Split 06+) join the gate automatically once
# their deterministic tests land — no CI edit needed.
testpaths = ["core/tests", "api/tests", "eval/tests"]
pythonpath = ["."]
addopts = "--import-mode=importlib"
markers = [
    "live: tests that call the Anthropic API or load ML models (needs ANTHROPIC_API_KEY)",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["scribeintake"]
